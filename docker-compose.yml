services:
  notification-hub:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_PATH: "/data/notification-hub.db"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?set ENCRYPTION_KEY to a 16/24/32 byte value}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_TIMEOUT: "${OPENAI_TIMEOUT:-30s}"
    volumes:
      - notification-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  notification-data:
